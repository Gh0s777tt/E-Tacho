# Static analysis for the compliance engine.
# This is safety-relevant code, so we run a strict configuration.
include: package:lints/recommended.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Make these warnings fatal in the engine.
    missing_return: error
    dead_code: error

linter:
  rules:
    - always_declare_return_types
    - avoid_print
    - prefer_const_constructors
    - prefer_const_declarations
    - prefer_final_locals
    - prefer_final_in_for_each
    - prefer_single_quotes
    - unawaited_futures
    - unnecessary_lambdas
    - directives_ordering
